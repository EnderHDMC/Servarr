# Setup default properties we want on all/most containers
x-default-container: &default-container
  environment:
    - PUID=1000
    - PGID=100
    - TZ=Africa/Harare
  restart: unless-stopped

# Containers on the mediarr network also have access to specific volumes
x-mediarr-container: &mediarr-container
  <<: *default-container
  networks:
    - mediarr

services:
  jellyfin:
    <<: *default-container
    container_name: jellyfin
    image: jellyfin/jellyfin
    environment:
      - JELLYFIN_CACHE_DIR=/var/cache/jellyfin
      - JELLYFIN_CONFIG_DIR=/etc/jellyfin
      - JELLYFIN_DATA_DIR=/var/lib/jellyfin
      - JELLYFIN_LOG_DIR=/var/log/jellyfin
    volumes:
      - ./configs/jellyfin/etc:/etc/jellyfin
      - ./configs/jellyfin/var-cache:/var/cache/jellyfin
      - ./configs/jellyfin/var-lib:/var/lib/jellyfin
      - ./configs/jellyfin/var-log:/var/log/jellyfin
      - ./configs/jellyfin/timezone:/etc/timezone
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    network_mode: "host"

  bazarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    volumes:
      - ./configs/mediarr/bazarr:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    ports:
      - 6767:6767
    depends_on:
      - sonarr
      - radarr

  jellyseerr:
    <<: *mediarr-container
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    hostname: jellyseerr
    ports:
      - 5055:5055
    volumes:
      - ./configs/mediarr/jellyseerr:/app/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    depends_on:
      - sonarr
      - radarr

  prowlarr:
    <<: *mediarr-container
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr
    volumes:
      - ./configs/mediarr/prowlarr:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    ports:
      - 9696:9696
    depends_on:
      - flaresolverr

  flaresolverr:
    <<: *mediarr-container
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    hostname: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
    restart: unless-stopped

  qbittorrent:
    <<: *mediarr-container
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    hostname: qbittorrent
    environment:
      - WEBUI_PORT=8080
    volumes:
      - ./configs/mediarr/qbittorrent:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp

  radarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr
    volumes:
      - ./configs/mediarr/radarr:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    ports:
      - 7878:7878
    depends_on:
      - prowlarr
      - qbittorrent
      - jellyfin

  sonarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr
    volumes:
      - ./configs/mediarr/sonarr:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    depends_on:
      - prowlarr
      - qbittorrent
      - jellyfin
    ports:
      - 8989:8989

  homepage:
    <<: *mediarr-container
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    hostname: homepage
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - DOCKER_DISCOVERY=true
      - DOCKER_NETWORK=mediarr
    volumes:
      - ./configs/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 3000:3000
    restart: unless-stopped

  caddy:
    <<: *default-container
    image: caddy:latest
    container_name: caddy
    hostname: caddy
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./configs/caddy/data:/data
      - ./configs/caddy/config:/config
    networks:
      - mediarr
    depends_on:
      - homepage
      - jellyfin
      - sonarr
      - radarr
      - prowlarr
      - bazarr
      - qbittorrent
      - jellyseerr

networks:
  mediarr:
    driver: bridge
