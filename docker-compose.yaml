# Common defaults for all containers
x-default-container: &default-container
  environment:
    - PUID=1000
    - PGID=100
    - TZ=Africa/Harare
  restart: unless-stopped

# Extension for mediarr-related containers
x-mediarr-container: &mediarr-container
  <<: *default-container
  networks:
    - mediarr

services:
  bazarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    volumes:
      - ./configs/mediarr/bazarr:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    depends_on:
      - sonarr
      - radarr

  prowlarr:
    <<: *mediarr-container
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr
    volumes:
      - ./configs/mediarr/prowlarr:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    depends_on:
      - flaresolverr

  flaresolverr:
    <<: *mediarr-container
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    hostname: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
    volumes:
      - flare_config:/config

  qbittorrent:
    <<: *mediarr-container
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    hostname: qbittorrent
    environment:
      - WEBUI_PORT=8080
    volumes:
      - ./configs/mediarr/qbittorrent:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    ports:
      - 6881:6881
      - 6881:6881/udp

  radarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr
    volumes:
      - ./configs/mediarr/radarr:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    depends_on:
      - prowlarr
      - qbittorrent

  sonarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr
    volumes:
      - ./configs/mediarr/sonarr:/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    depends_on:
      - prowlarr
      - qbittorrent

  jellyseerr:
    <<: *mediarr-container
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    hostname: jellyseerr
    volumes:
      - ./configs/mediarr/jellyseerr:/app/config
      - /b/Servarr/Media:/mnt/media
      - /b/Servarr/Downloads:/mnt/downloads
    depends_on:
      - sonarr
      - radarr

  jellyfin:
    <<: *default-container
    container_name: jellyfin
    image: jellyfin/jellyfin
    hostname: jellyfin
    networks:
      - jelly
    environment:
      - JELLYFIN_CACHE_DIR=/var/cache/jellyfin
      - JELLYFIN_CONFIG_DIR=/etc/jellyfin
      - JELLYFIN_DATA_DIR=/var/lib/jellyfin
      - JELLYFIN_LOG_DIR=/var/log/jellyfin
    volumes:
      - ./configs/jellyfin/etc:/etc/jellyfin
      - ./configs/jellyfin/var-cache:/var/cache/jellyfin
      - ./configs/jellyfin/var-lib:/var/lib/jellyfin
      - ./configs/jellyfin/var-log:/var/log/jellyfin
      - ./configs/jellyfin/timezone:/etc/timezone
      - /b/Servarr/Media:/mnt/media
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  homepage:
    <<: *mediarr-container
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    hostname: homepage
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - DOCKER_DISCOVERY=true
      - DOCKER_NETWORK=mediarr
    volumes:
      - ./configs/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

  caddy:
    <<: *default-container
    image: caddy:latest
    container_name: caddy
    # network_mode: host
    hostname: caddy
    env_file: .env.caddy.local
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./public:/srv/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mediarr
      - jelly
    depends_on:
      - homepage
      - sonarr
      - radarr
      - prowlarr
      - bazarr
      - qbittorrent
      - jellyseerr
      - jellyfin

networks:
  mediarr:
    driver: bridge
  jelly:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  flare_config:
