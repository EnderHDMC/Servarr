# Common defaults for all containers
x-default-container: &default-container
  environment:
    - PUID=1000
    - PGID=10
    - TZ=Africa/Harare
  restart: unless-stopped

# Extension for mediarr-related containers
x-mediarr-container: &mediarr-container
  <<: *default-container
  networks:
    - mediarr

services:
  bazarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr
    ports:
      - 6767:6767
    volumes:
      - ./configs/mediarr/bazarr:/config
      - ./media:/mnt/media
      - ./downloads:/mnt/downloads
    depends_on:
      - sonarr
      - radarr

  prowlarr:
    <<: *mediarr-container
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr
    ports:
      - 9696:9696
    volumes:
      - ./configs/mediarr/prowlarr:/config
      - ./media:/mnt/media
      - ./downloads:/mnt/downloads
    depends_on:
      - flaresolverr

  flaresolverr:
    <<: *mediarr-container
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    hostname: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
    volumes:
      - flare_config:/config

  qbittorrent:
    <<: *mediarr-container
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    hostname: qbittorrent
    environment:
      - WEBUI_PORT=8080
    volumes:
      - ./configs/mediarr/qbittorrent:/config
      - ./media:/mnt/media
      - ./downloads:/mnt/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp

  radarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    hostname: radarr
    ports:
      - 7878:7878
    volumes:
      - ./configs/mediarr/radarr:/config
      - ./media:/mnt/media
      - ./downloads:/mnt/downloads
    depends_on:
      - prowlarr
      - qbittorrent

  sonarr:
    <<: *mediarr-container
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr
    ports:
      - 8989:8989
    volumes:
      - ./configs/mediarr/sonarr:/config
      - ./media:/mnt/media
      - ./downloads:/mnt/downloads
    depends_on:
      - prowlarr
      - qbittorrent

  jellyseerr:
    <<: *mediarr-container
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: jellyseerr
    hostname: jellyseerr
    environment:
      - PORT=5055
    ports:
      - 5055:5055
    networks:
      - jelly
      - mediarr
    volumes:
      - ./configs/mediarr/jellyseerr:/app/config
      - ./media:/mnt/media
      - ./downloads:/mnt/downloads
    depends_on:
      - sonarr
      - radarr

  jellyfin:
    <<: *default-container
    container_name: jellyfin
    image: jellyfin/jellyfin
    hostname: jellyfin
    ports:
      - 8096:8096
    networks:
      - jelly
    environment:
      - JELLYFIN_CACHE_DIR=/var/cache/jellyfin
      - JELLYFIN_CONFIG_DIR=/etc/jellyfin
      - JELLYFIN_DATA_DIR=/var/lib/jellyfin
      - JELLYFIN_LOG_DIR=/var/log/jellyfin
    volumes:
      - ./configs/jellyfin/etc:/etc/jellyfin
      - ./configs/jellyfin/var-cache:/var/cache/jellyfin
      - ./configs/jellyfin/var-lib:/var/lib/jellyfin
      - ./configs/jellyfin/var-log:/var/log/jellyfin
      - ./configs/jellyfin/timezone:/etc/timezone
      - ./media:/mnt/media
    # TODO: Add GPU support

  homepage:
    <<: *mediarr-container
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    hostname: homepage
    ports:
      - 3000:3000
    networks:
      - mediarr
      - jelly
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - DOCKER_DISCOVERY=true
      - DOCKER_NETWORK=mediarr
    volumes:
      - ./configs/homepage:/app/config
      - ./public/homepage:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro

  caddy:
    <<: *default-container
    image: caddy:latest
    container_name: caddy
    # network_mode: host
    hostname: caddy
    env_file: .env.caddy.local
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./public/caddy:/srv/caddy
      - caddy_data:/data
      - caddy_config:/config
    profiles:
      - donotstart
    networks:
      - mediarr
      - jelly
    depends_on:
      - homepage
      - sonarr
      - radarr
      - prowlarr
      - bazarr
      - qbittorrent
      - jellyseerr
      - jellyfin

networks:
  mediarr:
    driver: bridge
  jelly:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  flare_config:
